<?xml version="1.0" encoding="UTF-8"?>
<!--
  auExpert — wordmark primário
  Uso: fundo escuro (#0D0E16 ou similar) ou transparente sobre backgrounds dark.
  Proporção: 240×64 (escalável — SVG preserva qualidade em qualquer tamanho).
  Fontes embutidas via @import, fallback em serif genérico.
  `au` em Playfair italic 500, `Expert` em Playfair regular 500.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-label="auExpert">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&display=swap');
      .au     { font-family: 'Playfair Display', Didot, Georgia, serif; font-weight: 500; font-style: italic; }
      .expert { font-family: 'Playfair Display', Didot, Georgia, serif; font-weight: 500; font-style: normal; }
    ]]></style>
  </defs>
  <text x="12" y="46" class="au"     font-size="38" fill="#F0EDF5">au</text>
  <text x="64" y="46" class="expert" font-size="38" fill="#A89FB5" letter-spacing="0.3">Expert</text>
</svg>
