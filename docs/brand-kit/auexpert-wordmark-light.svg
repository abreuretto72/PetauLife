<?xml version="1.0" encoding="UTF-8"?>
<!--
  auExpert — wordmark pra fundo CLARO.
  Usa ametista escuro pro `au` e cinza médio pro `Expert` pra manter hierarquia
  sem o branco do tema dark. Ideal pra papelaria, apresentações, docs em Word/PDF.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-label="auExpert">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,500&display=swap');
      .au     { font-family: 'Playfair Display', Didot, Georgia, serif; font-weight: 500; font-style: italic; }
      .expert { font-family: 'Playfair Display', Didot, Georgia, serif; font-weight: 500; font-style: normal; }
    ]]></style>
  </defs>
  <text x="12" y="46" class="au"     font-size="38" fill="#6B5A8A">au</text>
  <text x="64" y="46" class="expert" font-size="38" fill="#6B6478" letter-spacing="0.3">Expert</text>
</svg>
