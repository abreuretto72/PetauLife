<?xml version="1.0" encoding="UTF-8"?>
<!--
  auExpert adaptive icon — Android BACKGROUND layer.
  Canvas 432×432. Preenche totalmente — o Android aplica a máscara do launcher
  em cima dessa imagem. Usar gradiente sutil (não conflita com máscaras).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="432" height="432" viewBox="0 0 432 432">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#9C8BB8"/>
      <stop offset="55%"  stop-color="#8F7FA8"/>
      <stop offset="100%" stop-color="#5C4A78"/>
    </linearGradient>
  </defs>
  <rect width="432" height="432" fill="url(#bg)"/>
</svg>
