<?xml version="1.0" encoding="UTF-8"?>
<!--
  auExpert notification icon — Android status bar.
  Canvas 192×192, fundo TRANSPARENTE, figura SÓ em branco (Android status bar
  renderiza apenas alpha channel — qualquer cor vira cinza neutro).
  Único elemento: "au" em Playfair italic, branco sólido.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500&display=swap');
      .au { font-family: 'Playfair Display', Didot, Georgia, serif; font-weight: 500; font-style: italic; }
    ]]></style>
  </defs>
  <text x="96" y="135"
        text-anchor="middle"
        class="au"
        font-size="130"
        fill="#FFFFFF"
        letter-spacing="-3">au</text>
</svg>
